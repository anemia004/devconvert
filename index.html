<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />

  <title>DevConvert</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">
    <header class="block block--hero">
      <div class="hero-grid">
        <div class="hero-text">
          <h1 class="heading-xl">
            Convert binary, hex,<br>
            decimal, and text<br>
            instantly
          </h1>

          <p class="hero-subtitle">
            UTF-8 safe, BigInt-aware, and worker-powered.
          </p>

          <span class="hero-punch">
            Input one format. Get all formats.
          </span>
        </div>

        <button class="theme-toggle btn--dark" id="themeToggle">
          Theme: Auto
        </button>
      </div>
    </header>

    <main class="block block--converter">

      <div class="input-panel">

        <div class="chip-group" id="inputFormatChips">
          <button class="chip chip--active" data-format="binary">Binary</button>
          <button class="chip" data-format="hex">Hex</button>
          <button class="chip" data-format="decimal">Decimal</button>
          <button class="chip" data-format="text">Text</button>
        </div>

        <textarea
          class="input-textarea"
          id="inputTextarea"
          placeholder="Enter value..."
        ></textarea>

      </div>

      <div class="output-panel">

        <div class="chip-group" id="outputFormatChips">
          <button class="chip chip--active-output" data-format="binary">Binary</button>
          <button class="chip" data-format="hex">Hex</button>
          <button class="chip" data-format="decimal">Decimal</button>
          <button class="chip" data-format="text">Text</button>
        </div>

        <div class="output-display-box" id="outputDisplay">
          —
        </div>

      </div>

    </main>
  </div>

  <script src="script.js"></script>

</body>
</html>
